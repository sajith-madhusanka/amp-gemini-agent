openapi: 3.0.3
info:
  title: WSO2 Support Assistant
  description: |
    A LangGraph ReAct agent that answers WSO2 product support questions using
    a curated knowledge base. Powered by Google Gemini through the AMP LLM
    proxy gateway.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local development server
paths:
  /chat:
    post:
      summary: Chat with the WSO2 Support Assistant
      description: |
        Sends a support question to the agent and returns an answer. The agent
        can look up known issues, decode error codes, check product compatibility,
        find documentation, and explain WSO2 product features.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              errorCode:
                summary: Decode an error code
                value:
                  session_id: "session_123"
                  message: "My APIM returns error 900901 — what does that mean?"
              compatibility:
                summary: Check product compatibility
                value:
                  session_id: "session_456"
                  message: "Is WSO2 APIM 4.3.0 compatible with Identity Server 7.1.0?"
      responses:
        '200':
          description: Successful response from the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              examples:
                errorCodeResponse:
                  summary: Error code explanation
                  value:
                    response: "Error 900901 means the API key is invalid or missing."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "An error occurred while processing your request"
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  agent:
                    type: string
                    example: WSO2 Support Assistant
components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The support question or query
        session_id:
          type: string
          description: Unique identifier for the conversation session (optional)
        context:
          type: object
          description: Additional context passed by AMP (optional)
          additionalProperties: true
    ChatResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: The agent's answer
        session_id:
          type: string
          description: Echo of the session_id from the request
